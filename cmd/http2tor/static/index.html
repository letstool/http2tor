<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<title>http2tor — Tor Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════
   MATERIAL DESIGN 3 — DESIGN TOKENS
══════════════════════════════════════════════════════════════════ */
:root {
  --md-primary:               #9ECAFF;
  --md-on-primary:            #003258;
  --md-primary-container:     #00497D;
  --md-on-primary-container:  #D1E4FF;
  --md-secondary:             #BBC8DA;
  --md-on-secondary:          #263141;
  --md-secondary-container:   #3C4758;
  --md-on-secondary-container:#D7E3F7;
  --md-tertiary:              #4FD8E0;
  --md-on-tertiary:           #00373D;
  --md-tertiary-container:    #004F56;
  --md-on-tertiary-container: #97F0F8;
  --md-error:                 #FFB4AB;
  --md-on-error:              #690005;
  --md-error-container:       #93000A;
  --md-on-error-container:    #FFDAD6;
  --md-success:               #57D9A3;
  --md-success-container:     #00513A;
  --md-on-success-container:  #75F7BC;
  --md-warning:               #FFB74D;
  --md-warning-container:     #5A3900;
  --md-on-warning-container:  #FFD9A0;
  --md-background:               #111318;
  --md-on-background:            #E2E2E6;
  --md-surface:                  #111318;
  --md-on-surface:               #E2E2E6;
  --md-surface-variant:          #43474E;
  --md-on-surface-variant:       #C3C7CF;
  --md-surface-container-lowest: #0C0E11;
  --md-surface-container-low:    #1A1C1E;
  --md-surface-container:        #1E2025;
  --md-surface-container-high:   #28292F;
  --md-surface-container-highest:#33363F;
  --md-outline:         #8D9199;
  --md-outline-variant: #43474E;
  --md-shape-xs:   4px;
  --md-shape-sm:   8px;
  --md-shape-md:   12px;
  --md-shape-full: 100px;
  --md-elev-1: 0 1px 2px rgba(0,0,0,.3),  0 1px 3px 1px rgba(0,0,0,.15);
  --md-elev-2: 0 1px 2px rgba(0,0,0,.3),  0 2px 6px 2px rgba(0,0,0,.15);
  --md-elev-3: 0 1px 3px rgba(0,0,0,.3),  0 4px 8px 3px rgba(0,0,0,.15);
  --md-state-surface-hover: rgba(226,226,230,0.08);
  --md-font:      'Roboto', sans-serif;
  --md-font-mono: 'Roboto Mono', 'Courier New', monospace;
  /* Legacy compat vars used in JS-generated HTML */
  --bg:        var(--md-background);
  --surface:   var(--md-surface-container);
  --border:    var(--md-outline-variant);
  --border-hi: var(--md-outline);
  --accent:    var(--md-primary);
  --accent2:   var(--md-primary);
  --accent-dim:var(--md-primary-container);
  --text:      var(--md-on-surface);
  --text-dim:  var(--md-on-surface-variant);
  --text-mid:  var(--md-on-surface-variant);
  --ok:        var(--md-success);
  --ok-dim:    var(--md-success-container);
  --warn:      var(--md-warning);
  --warn-dim:  var(--md-warning-container);
  --err:       var(--md-error);
  --err-dim:   var(--md-error-container);
  --tor:       var(--md-primary);
  --tor-dim:   var(--md-primary-container);
  --notor:     var(--md-on-surface-variant);
  --notor-dim: var(--md-surface-container-highest);
  --panel-tint:rgba(158,202,255,0.05);
  --raw-bg:    var(--md-surface-container-lowest);
  --sel-bg:    var(--md-surface-container-high);
  --ring:      var(--md-primary);
  --mono:      var(--md-font-mono);
  --sans:      var(--md-font);
}
[data-theme="light"] {
  --md-primary:               #0061A4;
  --md-on-primary:            #FFFFFF;
  --md-primary-container:     #D1E4FF;
  --md-on-primary-container:  #001D36;
  --md-secondary:             #535F70;
  --md-on-secondary:          #FFFFFF;
  --md-secondary-container:   #D7E3F7;
  --md-on-secondary-container:#101C2B;
  --md-tertiary:              #006A6B;
  --md-on-tertiary:           #FFFFFF;
  --md-tertiary-container:    #9CF1F0;
  --md-on-tertiary-container: #002020;
  --md-error:                 #BA1A1A;
  --md-on-error:              #FFFFFF;
  --md-error-container:       #FFDAD6;
  --md-on-error-container:    #410002;
  --md-success:               #006C4C;
  --md-success-container:     #8AF5C7;
  --md-on-success-container:  #002115;
  --md-warning:               #7B5000;
  --md-warning-container:     #FFDDB3;
  --md-on-warning-container:  #271900;
  --md-background:               #FAFCFF;
  --md-on-background:            #1A1C1E;
  --md-surface:                  #F8F9FF;
  --md-on-surface:               #1A1C1E;
  --md-surface-variant:          #DFE2EB;
  --md-on-surface-variant:       #43474E;
  --md-surface-container-lowest: #FFFFFF;
  --md-surface-container-low:    #F1F3FA;
  --md-surface-container:        #EBEDF4;
  --md-surface-container-high:   #E5E7EE;
  --md-surface-container-highest:#DFE2E8;
  --md-outline:         #73777F;
  --md-outline-variant: #C3C7CF;
  --md-elev-1: 0 1px 2px rgba(0,0,0,.12), 0 1px 3px 1px rgba(0,0,0,.06);
  --md-elev-2: 0 1px 2px rgba(0,0,0,.12), 0 2px 6px 2px rgba(0,0,0,.06);
  --md-elev-3: 0 1px 3px rgba(0,0,0,.12), 0 4px 8px 3px rgba(0,0,0,.06);
  --md-state-surface-hover: rgba(26,28,30,0.08);
  --panel-tint: rgba(0,97,164,0.05);
  --raw-bg: var(--md-surface-container-lowest);
  --sel-bg: var(--md-surface-container-low);
}

/* ══════════════════════════════════════════════════════════════════
   BASE
══════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.skip-link {
  position: absolute; top: -100px; left: 16px; z-index: 9999;
  background: var(--md-primary); color: var(--md-on-primary);
  font-family: var(--md-font); font-size: .875rem; font-weight: 500;
  padding: 10px 24px; border-radius: var(--md-shape-full);
  text-decoration: none; transition: top .2s;
}
.skip-link:focus { top: 8px; }
:focus-visible { outline: 3px solid var(--md-primary); outline-offset: 2px; border-radius: var(--md-shape-xs); }
:focus:not(:focus-visible) { outline: none; }

body {
  background: var(--md-background); color: var(--md-on-background);
  font-family: var(--md-font); font-size: 1rem; line-height: 1.5;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 0 16px 80px;
  transition: background .3s, color .3s;
}

/* RTL */
[dir="rtl"] .panel-head::before  { margin-left: 0; margin-right: 10px; }
[dir="rtl"] .result-time         { margin-inline-start: auto; margin-left: 0; }
[dir="rtl"] .tor-table th        { text-align: right; }
[dir="rtl"] .tor-table td        { text-align: right; }
[dir="rtl"] .skip-link           { left: auto; right: 16px; }
[dir="rtl"] select               { background-position: left 12px center; padding-left: 36px; padding-right: 14px; }

/* ══════════════════════════════════════════════════════════════════
   TOP APP BAR
══════════════════════════════════════════════════════════════════ */
header {
  width: 100%; max-width: 960px;
  padding: 16px 0; display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
}

/* Onion logo — concentric ellipses */
.logo-onion { width: 36px; height: 36px; flex-shrink: 0; }
.logo-onion .ring { fill: none; stroke: var(--md-primary); stroke-width: 1.5; transition: stroke .3s; }
.logo-onion .core { fill: var(--md-primary); opacity: .9; transition: fill .3s; }

.header-text h1 {
  font-family: var(--md-font); font-size: 1.375rem; font-weight: 400;
  color: var(--md-on-surface); transition: color .3s;
}
.header-text p {
  font-size: .75rem; color: var(--md-on-surface-variant);
  letter-spacing: .025em; margin-top: 2px; transition: color .3s;
}
.header-right { margin-inline-start: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Theme toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  background: var(--md-surface-container-high); border: none;
  border-radius: var(--md-shape-full); padding: 8px 16px 8px 12px;
  color: var(--md-on-surface-variant);
  transition: background .2s, color .2s; position: relative; overflow: hidden;
}
.theme-toggle::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: var(--md-state-surface-hover); opacity: 0; transition: opacity .2s;
}
.theme-toggle:hover::after, .theme-toggle:focus-visible::after { opacity: 1; }
.theme-toggle:hover { color: var(--md-on-surface); }
.theme-icon { font-size: .9rem; line-height: 1; }
.theme-track { width: 32px; height: 16px; background: var(--md-outline); border-radius: var(--md-shape-full); position: relative; flex-shrink: 0; transition: background .3s; }
.theme-thumb { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--md-surface-container-highest); transition: transform .3s; }
[data-theme="light"] .theme-track { background: var(--md-primary); }
[data-theme="light"] .theme-thumb { background: var(--md-on-primary); transform: translateX(16px); }
.theme-label { font-family: var(--md-font); font-size: .6875rem; font-weight: 500; white-space: nowrap; }

/* Custom Language Dropdown */
.lang-wrap { position: relative; }
#lang-sel { display: none; }
.lang-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--md-surface-container-high); border: 1px solid var(--md-outline);
  border-radius: var(--md-shape-xs); color: var(--md-on-surface-variant);
  font-family: var(--md-font); font-size: .875rem; padding: 8px 12px;
  cursor: pointer; outline: none; min-height: 40px;
  transition: border-color .2s, color .2s; position: relative; overflow: hidden; white-space: nowrap;
}
.lang-btn::after { content: ''; position: absolute; inset: 0; background: var(--md-state-surface-hover); opacity: 0; transition: opacity .2s; }
.lang-btn:hover::after, .lang-btn.open::after { opacity: 1; }
.lang-btn:hover, .lang-btn.open { border-color: var(--md-on-surface); color: var(--md-on-surface); }
.lang-btn:focus-visible { border-color: var(--md-primary); border-width: 2px; outline: none; }
.lang-flag-icon { font-size: 1.1rem; line-height: 1; flex-shrink: 0; }
.lang-current-name { font-size: .8125rem; }
.lang-chevron-icon { flex-shrink: 0; color: var(--md-on-surface-variant); transition: transform .2s; }
.lang-btn.open .lang-chevron-icon { transform: rotate(180deg); }
.lang-options {
  position: absolute; top: calc(100% + 4px); right: 0;
  background: var(--md-surface-container-high); border-radius: var(--md-shape-sm);
  box-shadow: var(--md-elev-3); min-width: 220px; max-height: 320px; overflow-y: auto;
  z-index: 1000; padding: 4px 0; list-style: none;
  transform-origin: top right; animation: menuOpen .15s ease-out;
}
@keyframes menuOpen { from{opacity:0;transform:scale(.95) translateY(-4px)} to{opacity:1;transform:scale(1) translateY(0)} }
.lang-options::-webkit-scrollbar { width: 4px; }
.lang-options::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 2px; }
.lang-option {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  cursor: pointer; font-family: var(--md-font); font-size: .875rem; color: var(--md-on-surface);
  position: relative; user-select: none;
}
.lang-option::after { content: ''; position: absolute; inset: 0; background: var(--md-on-surface); opacity: 0; transition: opacity .12s; }
.lang-option:hover::after { opacity: .08; }
.lang-option[aria-selected="true"] { background: var(--md-primary-container); color: var(--md-on-primary-container); }
.lang-option[aria-selected="true"]::after { display: none; }
.lang-option .lang-flag-icon { font-size: 1.15rem; }

/* ══════════════════════════════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════════════════════════════ */
main { width: 100%; max-width: 960px; }

.panel { background: var(--md-surface-container); border: none; border-radius: var(--md-shape-md); overflow: hidden; margin-bottom: 16px; box-shadow: var(--md-elev-1); transition: background .3s; }
.panel-head {
  padding: 16px 24px; background: transparent; border-bottom: 1px solid var(--md-outline-variant);
  display: flex; align-items: center; gap: 12px;
  font-family: var(--md-font); font-size: 1rem; font-weight: 500;
  color: var(--md-on-surface); transition: color .3s, border-color .3s;
}
.panel-head::before { content: ''; display: inline-block; width: 3px; height: 20px; background: var(--md-primary); border-radius: var(--md-shape-xs); flex-shrink: 0; transition: background .3s; }
.panel-body { padding: 24px; }

/* ══════════════════════════════════════════════════════════════════
   FORM — MD3 Outlined Fields
══════════════════════════════════════════════════════════════════ */
.form-group { display: flex; flex-direction: column; gap: 6px; }
label { font-family: var(--md-font); font-size: .75rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; color: var(--md-on-surface-variant); cursor: pointer; }

input, textarea {
  background: transparent; border: 1px solid var(--md-outline); border-radius: var(--md-shape-xs);
  color: var(--md-on-surface); font-family: var(--md-font-mono); font-size: .875rem;
  padding: 12px 16px; outline: none; width: 100%;
  appearance: none; transition: border-color .2s; min-height: 48px;
}
input:hover:not(:focus-visible), textarea:hover:not(:focus-visible) { border-color: var(--md-on-surface); }
input:focus-visible, textarea:focus-visible { border-color: var(--md-primary); border-width: 2px; padding: 11px 15px; outline: none; }
input[aria-invalid="true"], textarea[aria-invalid="true"] { border-color: var(--md-error); border-width: 2px; padding: 11px 15px; }
input::placeholder, textarea::placeholder { color: var(--md-on-surface-variant); opacity: .7; }
textarea { resize: vertical; min-height: 110px; line-height: 1.6; }

/* ── MD3 Segmented Button (IP mode tabs) ── */
.ip-tabs {
  display: flex; border: 1px solid var(--md-outline); border-radius: var(--md-shape-full);
  overflow: hidden; margin-bottom: 16px; width: fit-content; transition: border-color .3s;
}
.ip-tab {
  padding: 10px 24px; font-family: var(--md-font); font-size: .875rem; font-weight: 500;
  letter-spacing: .006em; cursor: pointer; border: none; background: transparent;
  color: var(--md-on-surface); transition: background .15s, color .15s;
  user-select: none; min-height: 40px; position: relative; overflow: hidden;
}
.ip-tab + .ip-tab { border-left: 1px solid var(--md-outline); }
.ip-tab::after { content: ''; position: absolute; inset: 0; background: currentColor; opacity: 0; transition: opacity .15s; }
.ip-tab:hover::after { opacity: .08; }
.ip-tab[aria-selected="true"] { background: var(--md-secondary-container); color: var(--md-on-secondary-container); }
.ip-tab:focus-visible { outline: 2px solid var(--md-primary); outline-offset: -2px; z-index: 1; }
.ip-pane { display: none; } .ip-pane.active { display: block; }
.ip-hint { margin-top: 6px; font-family: var(--md-font); font-size: .75rem; color: var(--md-on-surface-variant); }

/* ── MD3 Filled Button ── */
.submit-row { margin-top: 28px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.btn-submit {
  display: flex; align-items: center; gap: 8px;
  background: var(--md-primary); color: var(--md-on-primary); border: none;
  font-family: var(--md-font); font-size: .875rem; font-weight: 500; letter-spacing: .006em;
  padding: 10px 24px; border-radius: var(--md-shape-full); cursor: pointer;
  position: relative; overflow: hidden; transition: box-shadow .2s;
  min-height: 40px; box-shadow: var(--md-elev-1);
}
.btn-submit::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background .2s; }
.btn-submit:hover::after { background: rgba(255,255,255,.08); }
.btn-submit:hover { box-shadow: var(--md-elev-2); }
.btn-submit:active { transform: scale(.98); box-shadow: none; }
.btn-submit:disabled { opacity: .38; cursor: not-allowed; box-shadow: none; }
.btn-submit:focus-visible { outline: 3px solid var(--md-primary); outline-offset: 3px; }
.spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: var(--md-on-primary); border-radius: 50%; animation: spin .7s linear infinite; }
.loading .spinner { display: block; } .loading .send-icon { display: none; }
.query-hint { font-family: var(--md-font); font-size: .75rem; color: var(--md-on-surface-variant); }
.query-hint[role="alert"] { color: var(--md-warning); }

/* ══════════════════════════════════════════════════════════════════
   RESULTS
══════════════════════════════════════════════════════════════════ */
#results-panel { display: none; }
.result-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.result-query-str { font-family: var(--md-font-mono); font-size: .8125rem; color: var(--md-on-surface-variant); }
.result-time { margin-inline-start: auto; font-family: var(--md-font); font-size: .75rem; color: var(--md-on-surface-variant); }

/* MD3 Status Badges */
.badge {
  font-family: var(--md-font); font-size: .6875rem; font-weight: 500;
  letter-spacing: .05em; text-transform: uppercase;
  padding: 4px 10px; border-radius: var(--md-shape-sm); border: none;
}
.badge-tor   { background: var(--md-primary-container);          color: var(--md-on-primary-container); }
.badge-notor { background: var(--md-surface-container-highest);  color: var(--md-on-surface-variant); }
.badge-error { background: var(--md-error-container);            color: var(--md-on-error-container); }

/* MD3 Outlined Button — Copy CSV */
.btn-copy {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: 1px solid var(--md-outline); border-radius: var(--md-shape-sm);
  color: var(--md-primary); font-family: var(--md-font); font-size: .75rem; font-weight: 500;
  letter-spacing: .005em; padding: 4px 12px; cursor: pointer;
  white-space: nowrap; transition: background .2s, border-color .2s;
  min-height: 32px; position: relative; overflow: hidden;
}
.btn-copy::after { content: ''; position: absolute; inset: 0; background: var(--md-primary); opacity: 0; transition: opacity .2s; }
.btn-copy:hover::after { opacity: .08; }
.btn-copy:hover { border-color: var(--md-primary); }
.btn-copy.copied { background: var(--md-success-container); border-color: transparent; color: var(--md-on-success-container); }

/* ══════════════════════════════════════════════════════════════════
   TOR TABLE — MD3 Data Table
══════════════════════════════════════════════════════════════════ */
.tor-table-wrap { overflow-x: auto; }
.tor-table { width: 100%; border-collapse: collapse; font-family: var(--md-font-mono); font-size: .8rem; }

.tor-table thead tr { border-bottom: 1px solid var(--md-outline-variant); background: var(--md-surface-container-high); }
.tor-table th {
  text-align: left; padding: 14px 12px;
  font-family: var(--md-font); font-size: .6875rem; font-weight: 500;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--md-on-surface-variant); white-space: nowrap;
}
.tor-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--md-outline-variant);
  vertical-align: top; transition: background .15s;
}
.tor-table tr:last-child td { border-bottom: none; }
.tor-table tr:hover td { background: rgba(158,202,255,.06); }
[data-theme="light"] .tor-table tr:hover td { background: rgba(0,97,164,.06); }

/* IP cell */
.td-ip       { font-weight: 500; color: var(--md-primary); white-space: nowrap; }
.td-ip.notor { color: var(--md-on-surface-variant); }
.td-notor-msg { color: var(--md-on-surface-variant); font-size: .8125rem; opacity: .8; }

/* Stacked cell */
.cell-main { display: block; }
.cell-sub  { display: block; margin-top: 2px; font-size: .75rem; color: var(--md-on-surface-variant); }
.cell-main.accent { color: var(--md-primary); }
.cell-main.muted  { color: var(--md-on-surface-variant); }

/* Fingerprint short */
.fp-short { font-size: .75rem; color: var(--md-on-surface-variant); letter-spacing: .04em; display: block; margin-top: 2px; }

/* ── Node Type Pills (Tor relay roles) ── */
.node-pill {
  display: inline-block; padding: 3px 10px; border-radius: var(--md-shape-sm);
  font-family: var(--md-font); font-size: .6875rem; font-weight: 500;
  letter-spacing: .05em; text-transform: uppercase; white-space: nowrap; border: none;
}
/* Guard → success (entrance = trusted = green) */
.node-guard         { background: var(--md-success-container); color: var(--md-on-success-container); }
/* Exit → error (exit = high-risk = red) */
.node-exit          { background: var(--md-error-container);   color: var(--md-on-error-container); }
/* Guard+Exit → warning (double-role = orange) */
.node-guard_and_exit{ background: var(--md-warning-container); color: var(--md-on-warning-container); }
/* Middle → secondary (relay = neutral) */
.node-middle        { background: var(--md-secondary-container); color: var(--md-on-secondary-container); }
/* Authority → tertiary (special = teal) */
.node-authority     { background: var(--md-tertiary-container); color: var(--md-on-tertiary-container); }

/* ── Flag Chips (Tor relay flags) ── */
.flags-wrap { display: flex; flex-wrap: wrap; gap: 4px; max-width: 240px; }
.flag-chip {
  font-family: var(--md-font); font-size: .6875rem; font-weight: 400;
  padding: 2px 8px; border-radius: var(--md-shape-xs); border: none;
  background: var(--md-surface-container-high); color: var(--md-on-surface-variant);
  white-space: nowrap; display: inline-block;
}
.flag-chip.flag-Guard     { background: var(--md-success-container); color: var(--md-on-success-container); }
.flag-chip.flag-Exit      { background: var(--md-error-container);   color: var(--md-on-error-container); }
.flag-chip.flag-Authority { background: var(--md-tertiary-container); color: var(--md-on-tertiary-container); }
.flag-chip.flag-HSDir     { background: var(--md-primary-container); color: var(--md-on-primary-container); }
.flag-chip.flag-Fast      { background: var(--md-secondary-container); color: var(--md-on-secondary-container); }
.flag-chip.flag-Stable    { background: var(--md-secondary-container); color: var(--md-on-secondary-container); opacity: .8; }

/* ── Misc ── */
.raw-block {
  background: var(--md-surface-container-lowest); border: 1px solid var(--md-outline-variant);
  border-radius: var(--md-shape-sm); padding: 16px 20px;
  font-family: var(--md-font-mono); font-size: .8125rem; color: var(--md-on-surface-variant);
  white-space: pre-wrap; word-break: break-all; line-height: 1.7;
}

/* ══════════════════════════════════════════════════════════════════
   STATS BAR
══════════════════════════════════════════════════════════════════ */
.stats-bar {
  display: flex; gap: 20px; padding: 12px 24px; flex-wrap: wrap;
  border-top: 1px solid var(--md-outline-variant);
  font-family: var(--md-font); font-size: .75rem; color: var(--md-on-surface-variant);
  background: var(--md-surface-container-high);
}
.stat-item { display: flex; align-items: center; gap: 6px; }
.stat-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.stat-dot.guard     { background: var(--md-success); }
.stat-dot.exit      { background: var(--md-error); }
.stat-dot.middle    { background: var(--md-primary); }
.stat-dot.authority { background: var(--md-tertiary); }
.stat-dot.notor     { background: var(--md-on-surface-variant); }

/* ══════════════════════════════════════════════════════════════════
   FOOTER / UTILITIES
══════════════════════════════════════════════════════════════════ */
.visually-hidden { position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important; }
footer { margin-top: 64px; font-family: var(--md-font); font-size: .75rem; color: var(--md-on-surface-variant); letter-spacing: .03em; text-align: center; opacity: .5; }

@keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms!important; transition-duration: .01ms!important; } }
@media (forced-colors: active) {
  .btn-submit { forced-color-adjust: none; }
  .badge-tor, .badge-notor, .badge-error { forced-color-adjust: none; }
  .node-pill { forced-color-adjust: none; }
}
@media (max-width: 600px) {
  .theme-label { display: none; }
  .flags-wrap { max-width: 160px; }
  .panel-body { padding: 16px; }
  .panel-head { padding: 14px 16px; }
}
</style>

const SUPPORTED=Object.keys(LANGS);
function detectLang(){
  for(const l of(navigator.languages||[navigator.language||'en'])){
    if(SUPPORTED.includes(l))return l;
    const b=l.split('-')[0];
    const m=SUPPORTED.find(s=>s===b||s.startsWith(b+'-'));
    if(m)return m;
  }
  return'en';
}

// ── THEME ──────────────────────────────────────────────────────────
const html=document.documentElement;
const themeBtn=document.getElementById('theme-toggle');
const themeLbl=document.getElementById('theme-label');
const themeIcon=document.getElementById('theme-icon');
let currentLang='en',isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
applyTheme(isDark);
themeBtn.addEventListener('click',()=>{isDark=!isDark;applyTheme(isDark)});
function applyTheme(dark){
  html.dataset.theme=dark?'dark':'light';
  themeBtn.setAttribute('aria-checked',dark?'false':'true');
  const t=LANGS[currentLang]||LANGS.en;
  themeLbl.textContent=dark?t.themeLight:t.themeDark;
  themeIcon.textContent=dark?'☀️':'🌙';
}

// ── LANGUAGE ───────────────────────────────────────────────────────
function applyLang(lang){
  currentLang=lang;
  const t=LANGS[lang]||LANGS.en;
  const dir=t.dir||'ltr';
  html.lang=lang;html.dir=dir;document.body.dir=dir;
  document.getElementById('skip-link').textContent=t.skipLink||'Skip to main content';
  document.getElementById('hdr-subtitle').textContent=t.subtitle;
  document.getElementById('ph-params').textContent=t.panelParams;
  document.getElementById('lbl-ip-mode').textContent=t.labelIpMode;
  document.getElementById('tab-single').textContent=t.tabSingle;
  document.getElementById('tab-multi').textContent=t.tabMulti;
  document.getElementById('ip-single').placeholder=t.placeholderSingle;
  document.getElementById('ip-multi').placeholder=t.placeholderMulti;
  document.getElementById('ip-single-hint').textContent=t.hintSingle;
  document.getElementById('ip-multi-hint').textContent=t.hintMulti;
  document.getElementById('btn-send-label').textContent=t.btnSend;
  document.getElementById('ph-results').textContent=t.panelResults;
  // Update lang selector label for RTL languages
  document.getElementById('lang-sel-lbl').textContent=dir==='rtl'?'اللغة':'Language';
  applyTheme(isDark);
}

const langSel=document.getElementById('lang-sel');
const initLang=detectLang();
langSel.value=SUPPORTED.includes(initLang)?initLang:'en';
applyLang(langSel.value);
langSel.addEventListener('change',()=>applyLang(langSel.value));

// ── TABS ───────────────────────────────────────────────────────────
let activeTab='single';
const ipTabs=Array.from(document.querySelectorAll('.ip-tab'));
ipTabs.forEach(b=>{
  b.addEventListener('click',()=>activateTab(b.dataset.tab,b));
  b.addEventListener('keydown',e=>{
    let i=ipTabs.indexOf(e.currentTarget);
    const dir=html.dir==='rtl'?-1:1;
    if(e.key==='ArrowRight'){e.preventDefault();ipTabs[(i+dir+ipTabs.length)%ipTabs.length].focus()}
    if(e.key==='ArrowLeft'){e.preventDefault();ipTabs[(i-dir+ipTabs.length)%ipTabs.length].focus()}
  });
});
function activateTab(id,btn){
  activeTab=id;
  ipTabs.forEach(b=>{b.setAttribute('aria-selected','false');b.tabIndex=-1});
  document.querySelectorAll('.ip-pane').forEach(p=>{p.classList.remove('active');p.hidden=true});
  btn.setAttribute('aria-selected','true');btn.tabIndex=0;
  const p=document.getElementById('pane-'+id);p.classList.add('active');p.hidden=false;
}
function parseIPs(r){return r.split(/[\n,\s]+/).map(s=>s.trim()).filter(Boolean)}
function getIPs(){
  if(activeTab==='single'){const v=document.getElementById('ip-single').value.trim();return v?[v]:[]}
  return parseIPs(document.getElementById('ip-multi').value);
}

// ── SUBMIT ─────────────────────────────────────────────────────────
const torForm=document.getElementById('tor-form'),btn=document.getElementById('btn-query'),
      hint=document.getElementById('query-hint'),srStatus=document.getElementById('sr-status');
torForm.addEventListener('submit',async e=>{
  e.preventDefault();
  const t=LANGS[currentLang]||LANGS.en;
  const ips=getIPs();
  const ai=activeTab==='single'?document.getElementById('ip-single'):document.getElementById('ip-multi');
  if(!ips.length){ai.focus();ai.setAttribute('aria-invalid','true');hint.textContent=t.warnNoIp;hint.style.color='var(--warn)';hint.setAttribute('role','alert');return}
  ai.setAttribute('aria-invalid','false');hint.textContent='';hint.removeAttribute('role');
  const payload=ips.length===1?{ip:ips[0]}:{ips};
  btn.disabled=true;btn.classList.add('loading');btn.setAttribute('aria-busy','true');srStatus.textContent=t.loadingLabel;
  const t0=performance.now();
  try{
    const res=await fetch('/api/v1/istor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const elapsed=((performance.now()-t0)/1000).toFixed(2);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();renderResults(data,ips,elapsed);srStatus.textContent=t.resultsReady(ips.length);
  }catch(err){renderError(err,ips,((performance.now()-t0)/1000).toFixed(2));srStatus.textContent=String(err)}
  finally{btn.disabled=false;btn.classList.remove('loading');btn.removeAttribute('aria-busy')}
});
document.getElementById('ip-single').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();torForm.requestSubmit()}});

// ── RENDER ─────────────────────────────────────────────────────────
let lastAnswers=[],lastIPs=[];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function renderResults(data,ips,elapsed){
  const panel=document.getElementById('results-panel'),body=document.getElementById('results-body'),stats=document.getElementById('stats-bar');
  const t=LANGS[currentLang]||LANGS.en;panel.style.display='block';
  if((data.status||'').toUpperCase()==='ERROR'){
    lastAnswers=[];lastIPs=[];
    body.innerHTML=`<div class="result-meta"><span class="badge badge-error">${t.errBadge}</span><span class="result-query-str">${esc(ips.join(', '))}</span><span class="result-time">${elapsed}s</span></div><div class="raw-block" role="alert" style="color:var(--err)">${esc(JSON.stringify(data,null,2))}</div>`;
    stats.style.display='none';finalize(panel);return;
  }
  const ansMap={};(data.answers||[]).forEach(a=>{if(a.ip)ansMap[a.ip]=a});
  lastIPs=ips;lastAnswers=ips.map(ip=>ansMap[ip]||null);
  const torCount=(data.answers||[]).filter(a=>a.is_tor).length;
  const qStr=ips.length===1?ips[0]:`${ips.length} IPs`;
  const oBadge=torCount>0?`<span class="badge badge-tor">${t.labelTor}</span>`:`<span class="badge badge-notor">${t.labelNotTor}</span>`;
  let rows='';ips.forEach(ip=>{const a=ansMap[ip];rows+=(a&&a.is_tor)?buildRow(a,t):buildNotFoundRow(ip,t)});
  body.innerHTML=`<div class="result-meta">${oBadge}<span class="result-query-str">${esc(qStr)}</span><span class="result-time">${elapsed}s · ${t.replyCount(ips.length)}</span><button class="btn-copy" id="btn-csv" type="button"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span id="csv-label">${esc(t.btnCopy)}</span></button></div><div class="tor-table-wrap"><table class="tor-table" aria-label="${esc(t.panelResults)}"><caption class="visually-hidden">${esc(t.panelResults)}</caption><thead><tr><th>IP</th><th>${esc(t.colStatus)}</th><th>${esc(t.colNodeType)}</th><th>${esc(t.colNickname)}</th><th>${esc(t.colFlags)}</th><th>${esc(t.colCountry)}</th><th>${esc(t.colSeen)}</th><th>${esc(t.colWeight)}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  document.getElementById('btn-csv').addEventListener('click',copyCSV);
  const c={guard:0,exit:0,middle:0,authority:0,notor:0};
  (data.answers||[]).forEach(a=>{if(!a.is_tor){c.notor++;return}if(a.is_authority)c.authority++;else if(a.is_guard&&a.is_exit){c.guard++;c.exit++}else if(a.is_guard)c.guard++;else if(a.is_exit)c.exit++;else c.middle++});
  const sp=[];
  if(c.guard)sp.push(`<span class="stat-item"><span class="stat-dot guard"></span>${c.guard} ${esc(t.statGuard)}</span>`);
  if(c.exit)sp.push(`<span class="stat-item"><span class="stat-dot exit"></span>${c.exit} ${esc(t.statExit)}</span>`);
  if(c.middle)sp.push(`<span class="stat-item"><span class="stat-dot middle"></span>${c.middle} ${esc(t.statMiddle)}</span>`);
  if(c.authority)sp.push(`<span class="stat-item"><span class="stat-dot authority"></span>${c.authority} ${esc(t.statAuthority)}</span>`);
  if(c.notor)sp.push(`<span class="stat-item"><span class="stat-dot notor"></span>${c.notor} ${esc(t.statNotTor)}</span>`);
  stats.innerHTML=sp.join('');stats.style.display=sp.length?'flex':'none';finalize(panel);
}
function nodeLabel(a){if(a.is_authority)return'authority';if(a.is_guard&&a.is_exit)return'guard_and_exit';if(a.is_guard)return'guard';if(a.is_exit)return'exit';return'middle'}
function nodePill(a,t){
  const k=nodeLabel(a);
  const lbl={guard:t.statGuard||'Guard',exit:t.statExit||'Exit',guard_and_exit:'Guard + Exit',middle:t.statMiddle||'Middle',authority:t.statAuthority||'Authority'};
  return`<span class="node-pill node-${k}">${esc(lbl[k]||k)}</span>`;
}
function buildRow(a,t){
  const flags=(a.flags||[]).map(f=>`<span class="flag-chip flag-${esc(f)}">${esc(f)}</span>`).join('');
  const fp=a.fingerprint?`<span class="fp-short">${esc(a.fingerprint.slice(0,10))}…</span>`:'';
  const country=a.country?`<span class="cell-main accent">${esc(a.country.toUpperCase())}</span>`:'';
  const asInfo=a.as_name?`<span class="cell-sub">${esc(a.as||'')} ${esc(a.as_name)}</span>`:'';
  const seen=a.first_seen?`<span class="cell-main muted">${esc(a.first_seen.slice(0,10))}</span>`:'—';
  const w=a.consensus_weight!=null?`<span class="cell-main muted">${Number(a.consensus_weight).toLocaleString()}</span>`:'—';
  return`<tr><td class="td-ip">${esc(a.ip)}</td><td><span class="badge badge-tor">${t.labelTor}</span></td><td>${nodePill(a,t)}</td><td><span class="cell-main accent">${esc(a.nickname||'—')}</span>${fp}</td><td><div class="flags-wrap">${flags||'—'}</div></td><td>${country}${asInfo}</td><td>${seen}</td><td>${w}</td></tr>`;
}
function buildNotFoundRow(ip,t){
  return`<tr><td class="td-ip notor">${esc(ip)}</td><td><span class="badge badge-notor">${t.labelNotTor}</span></td><td colspan="6" class="td-notor-msg">⊘ &nbsp;${esc(t.notTorMsg)}</td></tr>`;
}
function renderError(err,ips,elapsed){
  const panel=document.getElementById('results-panel'),body=document.getElementById('results-body');
  const t=LANGS[currentLang]||LANGS.en;panel.style.display='block';
  body.innerHTML=`<div class="result-meta"><span class="badge badge-error">${t.errBadge}</span><span class="result-query-str">${esc(ips.join(', '))}</span><span class="result-time">${elapsed}s</span></div><div class="raw-block" role="alert" style="color:var(--err)">${esc(String(err))}</div>`;
  document.getElementById('stats-bar').style.display='none';finalize(panel);
}

// ── CSV EXPORT ─────────────────────────────────────────────────────
function copyCSV(){
  const t=LANGS[currentLang]||LANGS.en;
  const hdr='ip|is_tor|node_type|nickname|fingerprint|country|as|as_name|first_seen|last_seen|consensus_weight|flags';
  const rows=lastIPs.map((ip,i)=>{
    const a=lastAnswers[i];
    if(!a||!a.is_tor)return[ip,'false','','','','','','','','','',''].join('|');
    return[a.ip,a.is_tor,a.node_type,a.nickname,a.fingerprint,a.country,a.as,a.as_name,a.first_seen,a.last_seen,a.consensus_weight,(a.flags||[]).join(',')].join('|');
  });
  const csv=[hdr,...rows].join('\r\n');
  navigator.clipboard.writeText(csv).then(()=>{
    const b=document.getElementById('btn-csv');const l=document.getElementById('csv-label');if(!b)return;
    b.classList.add('copied');l.textContent=t.btnCopied;
    setTimeout(()=>{b.classList.remove('copied');l.textContent=t.btnCopy},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=csv;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy')}catch(_){}document.body.removeChild(ta);
  });
}
function finalize(panel){panel.scrollIntoView({behavior:'smooth',block:'nearest'});panel.setAttribute('tabindex','-1');panel.focus({preventScroll:true})}

// CUSTOM LANGUAGE DROPDOWN
// ══════════════════════════════════════════════════════════════════
const LANG_META = {
  ar:{'flag':'🇸🇦','name':'العربية'},bn:{'flag':'🇧🇩','name':'বাংলা'},
  de:{'flag':'🇩🇪','name':'Deutsch'},en:{'flag':'🇬🇧','name':'English'},
  es:{'flag':'🇪🇸','name':'Español'},fr:{'flag':'🇫🇷','name':'Français'},
  hi:{'flag':'🇮🇳','name':'हिन्दी'},id:{'flag':'🇮🇩','name':'Bahasa Indonesia'},
  ja:{'flag':'🇯🇵','name':'日本語'},ko:{'flag':'🇰🇷','name':'한국어'},
  'pt-BR':{'flag':'🇧🇷','name':'Português (BR)'},ru:{'flag':'🇷🇺','name':'Русский'},
  ur:{'flag':'🇵🇰','name':'اردو'},vi:{'flag':'🇻🇳','name':'Tiếng Việt'},
  'zh-CN':{'flag':'🇨🇳','name':'中文'}
};
const _lb=document.getElementById('lang-btn'),_lo=document.getElementById('lang-options'),
      _lf=document.getElementById('lang-current-flag'),_ln=document.getElementById('lang-current-name');
Object.entries(LANG_META).forEach(([c,m])=>{
  const li=document.createElement('li');li.className='lang-option';li.setAttribute('role','option');
  li.setAttribute('aria-selected','false');li.dataset.value=c;
  li.innerHTML=`<span class="lang-flag-icon">${m.flag}</span><span>${m.name}</span>`;
  li.addEventListener('click',e=>{e.stopPropagation();_pk(c);_cl();});_lo.appendChild(li);
});
function _ud(c){const m=LANG_META[c]||LANG_META.en;_lf.textContent=m.flag;_ln.textContent=m.name;_lo.querySelectorAll('[role=option]').forEach(o=>o.setAttribute('aria-selected',o.dataset.value===c?'true':'false'));}
function _pk(c){langSel.value=c;_ud(c);applyLang(c);}
function _op(){_lo.hidden=false;_lb.setAttribute('aria-expanded','true');_lb.classList.add('open');const s=_lo.querySelector('[aria-selected="true"]');if(s)s.scrollIntoView({block:'nearest'});}
function _cl(){_lo.hidden=true;_lb.setAttribute('aria-expanded','false');_lb.classList.remove('open');}
_lb.addEventListener('click',e=>{e.stopPropagation();_lo.hidden?_op():_cl();});
_lo.addEventListener('keydown',e=>{
  const it=Array.from(_lo.querySelectorAll('.lang-option')),ix=it.indexOf(document.activeElement);
  if(e.key==='ArrowDown'){e.preventDefault();it[(ix+1)%it.length].focus();}
  if(e.key==='ArrowUp'){e.preventDefault();it[(ix-1+it.length)%it.length].focus();}
  if(e.key==='Enter'||e.key===' '){e.preventDefault();document.activeElement.click();}
  if(e.key==='Escape'){_cl();_lb.focus();}if(e.key==='Tab')_cl();
});
_lb.addEventListener('keydown',e=>{
  if(e.key==='Escape')_cl();
  if((e.key==='ArrowDown'||e.key==='Enter'||e.key===' ')&&_lo.hidden){e.preventDefault();_op();_lo.querySelector('.lang-option')?.focus();}
});
document.addEventListener('click',_cl);
document.addEventListener('keydown',e=>{if(e.key==='Escape')_cl();});
_ud(langSel.value);
</script>
</body>
</html>
